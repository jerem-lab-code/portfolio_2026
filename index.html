<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jeremie Kursner</title>
    <link rel="icon" type="image/svg+xml" href="./project-content/JK.svg" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body data-theme="light">
    <main class="page">
      <header class="top-header">
        <h1 class="name">
          <span class="name-part name-part-left" aria-label="Jérémie">
            <span class="name-letter" aria-hidden="true">K</span>
            <span class="name-letter" aria-hidden="true">é</span>
            <span class="name-letter" aria-hidden="true">r</span>
            <span class="name-letter" aria-hidden="true">é</span>
            <span class="name-letter" aria-hidden="true">m</span>
            <span class="name-letter" aria-hidden="true">i</span>
            <span class="name-letter" aria-hidden="true">e</span>
          </span>
          <span class="name-part name-part-right" aria-label="Kursner">
            <span class="name-letter" aria-hidden="true">K</span>
            <span class="name-letter" aria-hidden="true">u</span>
            <span class="name-letter" aria-hidden="true">r</span>
            <span class="name-letter" aria-hidden="true">s</span>
            <span class="name-letter" aria-hidden="true">n</span>
            <span class="name-letter" aria-hidden="true">e</span>
            <span class="name-letter" aria-hidden="true">r</span>
          </span>
        </h1>
      </header>

      <section class="actions" aria-label="Navigation principale">
        <button class="pill-button projects-button" id="projects-button" type="button">
          Projects
        </button>
        <button class="pill-button info-button" id="info-button" type="button">
          About me
        </button>
      </section>

      <section class="categories-layout" id="categories-layout" aria-label="Categories">
        <aside class="categories-sidebar" aria-label="Liste des categories">
          <div class="category-list" id="category-list"></div>
        </aside>
        <section class="gallery-panel" id="gallery-panel" aria-label="Projects gallery"></section>
      </section>
    </main>

    <script type="module" src="/main.js"></script>
  </body>
</html>
